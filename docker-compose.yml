services:
  warp:
    build: .
    image: warp_daisuki:latest
    container_name: warp_test
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
    ports:
      - "1080:1080"
      - "8080:8080/udp"
    environment:
      - LANG=C.UTF-8
    volumes:
      - warp_data:/var/lib/cloudflare-warp
    networks:
      - warp_net
    restart: unless-stopped

  socat:
    image: alpine/socat:latest
    container_name: warp_socat
    network_mode: "service:warp"
    depends_on:
      - warp
    command: >
      sh -c "socat TCP-LISTEN:1080,fork,reuseaddr TCP:127.0.0.1:1081 &
             socat UDP-LISTEN:1080,fork,reuseaddr UDP:127.0.0.1:1081 &
             wait"
    restart: unless-stopped

volumes:
  warp_data:

networks:
  warp_net:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.20.0.0/24
        - subnet: "fd00:dead:beef::/48"
